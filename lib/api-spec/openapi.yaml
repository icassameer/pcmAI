  /dashboard/sales-trend:
    get:
      operationId: getSalesTrend
      tags: [dashboard]
      summary: Get sales trend for last 30 days
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sales trend data
          content:
            application/json:
              schema:
                type: array

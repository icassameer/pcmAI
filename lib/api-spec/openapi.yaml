  /purchases/{id}:
    get:
      operationId: getPurchase
      tags: [purchases]
      summary: Get purchase
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseDetail"
    patch:
      operationId: updatePurchase
      tags: [purchases]
      summary: Update purchase
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePurchaseRequest"
      responses:
        "200":
          description: Purchase updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"
    delete:

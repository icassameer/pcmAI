  /sales/{id}/invoice-pdf:
    get:
      operationId: getSaleInvoicePdf
      tags: [sales]
      summary: Download sale invoice as PDF
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":

  /reports/sales-summary:
    get:
      operationId: getSalesSummaryReport
      tags: [reports]
      summary: Sales summary report
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, monthly, annual]
            default: monthly
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Sales summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesSummaryReport"

  /reports/purchase-summary:
    get:
      operationId: getPurchaseSummaryReport
      tags: [reports]
      summary: Purchase summary report
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Purchase summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseSummaryReport"

  /reports/inventory:
    get:
      operationId: getInventoryReport
      tags: [reports]
      summary: Inventory report
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [current, low-stock, out-of-stock, dead-stock, valuation]
            default: current
        - name: categoryId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Inventory report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryReport"

  /reports/gst-summary:
    get:
      operationId: getGstSummaryReport
      tags: [reports]
      summary: GST summary report
      security:
        - bearerAuth: []
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: GST summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GstSummaryReport"

  /business:
    get:
      operationId: getBusinessProfile
      tags: [business]
      summary: Get business profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Business profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessProfile"
    patch:
      operationId: updateBusinessProfile
      tags: [business]
      summary: Update business profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessRequest"
      responses:
        "200":
          description: Business profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessProfile"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - accessToken
        - refreshToken
        - user

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
